<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Drift Game</title>
<style>
  body {
    margin: 0;
    background: #111;
    overflow: hidden;
  }
  canvas {
    display: block;
    margin: auto;
    background: #222;
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let car = {
  x: 300,
  y: 200,
  angle: 0,
  speed: 0,
  drift: 0
};

const keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
  // Acceleration
  if (keys["ArrowUp"]) car.speed += 0.1;
  if (keys["ArrowDown"]) car.speed -= 0.1;

  // Friction
  car.speed *= 0.98;

  // Turning + Drift
  if (keys["ArrowLeft"]) {
    car.angle -= 0.05;
    car.drift += 0.02;
  }
  if (keys["ArrowRight"]) {
    car.angle += 0.05;
    car.drift -= 0.02;
  }

  // Drift effect (sliding sideways)
  let forwardX = Math.cos(car.angle);
  let forwardY = Math.sin(car.angle);

  let sideX = Math.cos(car.angle + Math.PI/2);
  let sideY = Math.sin(car.angle + Math.PI/2);

  car.x += forwardX * car.speed + sideX * car.drift;
  car.y += forwardY * car.speed + sideY * car.drift;

  // Reduce drift over time
  car.drift *= 0.9;

  // Keep inside screen
  car.x = Math.max(0, Math.min(canvas.width, car.x));
  car.y = Math.max(0, Math.min(canvas.height, car.y));
}

function drawTrack() {
  ctx.fillStyle = "#2d2d2d";
  ctx.fillRect(50, 50, 500, 300);

  ctx.fillStyle = "#3a3a3a";
  ctx.fillRect(100, 100, 400, 200);
}

function drawCar() {
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);

  // Pixel car
  ctx.fillStyle = "#ff4444";
  ctx.fillRect(-10, -5, 20, 10);

  ctx.fillStyle = "#000";
  ctx.fillRect(-8, -6, 5, 2);
  ctx.fillRect(3, -6, 5, 2);
  ctx.fillRect(-8, 4, 5, 2);
  ctx.fillRect(3, 4, 5, 2);

  ctx.restore();
}

function gameLoop() {
  update();

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawTrack();
  drawCar();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
